name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Sync version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          npm version $version --no-git-tag-version --allow-same-version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm install

      - name: Install script dependencies
        run: |
          cd scripts
          bun install

      - name: Download Bun binary for packaging
        run: |
          New-Item -ItemType Directory -Force -Path resources | Out-Null
          $bunExe = (Get-Command bun).Source
          Copy-Item $bunExe resources/bun.exe
          Write-Host "Bun binary size: $((Get-Item resources/bun.exe).Length) bytes"
        shell: pwsh

      - name: Build and Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build && npx electron-builder --win --x64 --publish never

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zhihu-desktop-windows
          path: dist-electron/*.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist-electron/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
