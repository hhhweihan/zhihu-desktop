name: CI Build

on:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - 'README.md'
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - '.claude/**'
      - 'README.md'
  workflow_dispatch:

concurrency:
  group: ci-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Cache Electron builder artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json', 'electron-builder.yml') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      - name: Install dependencies
        run: npm ci

      - name: Build and Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run build && npx electron-builder --win --x64 --publish never

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: zhihu-desktop-windows-${{ github.sha }}
          path: |
            dist-electron/*.exe
          retention-days: 30
