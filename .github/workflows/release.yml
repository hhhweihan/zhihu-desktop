name: Release From Tag

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-windows:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate tag version matches package.json
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}" -replace '^v', ''
          $packageVersion = node -p "require('./package.json').version"
          if ($tagVersion -ne $packageVersion) {
            Write-Error "Tag version ($tagVersion) does not match package.json version ($packageVersion). Tag releases now reuse CI artifacts, so the tagged commit must already contain the release version."
            exit 1
          }

      - name: Wait for CI Build to finish for this commit
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $headers = @{
            Authorization = "Bearer $env:GITHUB_TOKEN"
            Accept = "application/vnd.github+json"
            'X-GitHub-Api-Version' = '2022-11-28'
          }

          $owner = '${{ github.repository_owner }}'
          $repo = '${{ github.event.repository.name }}'
          $targetSha = '${{ github.sha }}'
          $workflowId = 'build.yml'
          $maxAttempts = 40

          for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            $url = "https://api.github.com/repos/$owner/$repo/actions/workflows/$workflowId/runs?head_sha=$targetSha&per_page=10"
            $response = Invoke-RestMethod -Uri $url -Headers $headers -Method Get
            $run = $response.workflow_runs |
              Where-Object { $_.head_sha -eq $targetSha -and $_.event -eq 'push' } |
              Select-Object -First 1

            if (-not $run) {
              Write-Host "[$attempt/$maxAttempts] CI Build run not found yet for $targetSha"
            }
            elseif ($run.status -eq 'completed') {
              if ($run.conclusion -ne 'success') {
                Write-Error "CI Build did not succeed for $targetSha. Conclusion: $($run.conclusion)"
                exit 1
              }

              Write-Host "CI Build completed successfully for $targetSha"
              exit 0
            }
            else {
              Write-Host "[$attempt/$maxAttempts] CI Build status: $($run.status)"
            }

            Start-Sleep -Seconds 15
          }

          Write-Error "Timed out waiting for CI Build to complete for $targetSha"
          exit 1

      - name: Download artifact from CI build
        id: download_artifact
        uses: dawidd6/action-download-artifact@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: build.yml
          commit: ${{ github.sha }}
          name: zhihu-desktop-windows-${{ github.sha }}
          path: release-artifacts
          if_no_artifact_found: fail

      - name: Show downloaded files
        shell: pwsh
        run: Get-ChildItem release-artifacts -Recurse | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-artifacts/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}