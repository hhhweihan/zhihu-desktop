<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- 背景渐变：深紫近黑 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d1433"/>
    </linearGradient>
    <!-- Z 字渐变：品牌紫 → 知乎蓝 -->
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9b6fc4"/>
      <stop offset="100%" stop-color="#4a8de8"/>
    </linearGradient>
    <!-- 光晕效果 -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景：圆角方形 -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- 微妙的内边框光泽 -->
  <rect width="512" height="512" rx="108" ry="108"
    fill="none" stroke="rgba(155,111,196,0.18)" stroke-width="2"/>

  <!-- Z 字主体 -->
  <text
    x="256" y="332"
    font-family="'Arial Black','Helvetica Neue',Helvetica,Arial,sans-serif"
    font-weight="900"
    font-size="296"
    text-anchor="middle"
    fill="url(#zGrad)"
    filter="url(#glow)"
    letter-spacing="-8"
  >Z</text>

  <!-- AI 光标：右下角闪烁符号，暗示 AI 写作 -->
  <rect x="316" y="316" width="13" height="68" rx="4"
    fill="#ffffff" opacity="0.85"/>

  <!-- 底部装饰线：知乎品牌紫 -->
  <rect x="88" y="428" width="336" height="5" rx="2.5"
    fill="url(#zGrad)" opacity="0.55"/>

  <!-- 顶部高光点：增加质感 -->
  <ellipse cx="256" cy="42" rx="80" ry="6"
    fill="rgba(255,255,255,0.06)"/>
</svg>
